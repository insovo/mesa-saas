<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MESA Recruit · UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />

  <!-- Tailwind play CDN (just like the codebase, with JIT) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            dm: ['DM Sans', 'sans-serif'],
            poppins: ['Poppins', 'sans-serif'],
          },
          colors: {
            brand: {
              50:  '#E9E3FF', 100: '#C0B8FE', 200: '#A195FD', 300: '#8171FC',
              400: '#7551FF', 500: '#422AFB', 600: '#3311DB', 700: '#2111A5',
              800: '#190793', 900: '#11047A',
            },
            navy: {
              700: '#1B254B', 800: '#111C44', 900: '#0B1437',
            },
            lightPrimary: '#F4F7FE',
          },
          boxShadow: {
            '3xl': '14px 17px 40px 4px rgba(112,144,176,0.08)',
          },
          borderRadius: { primary: '20px' },
        },
      },
    };
  </script>

  <!-- Lucide icons (substitute for react-icons) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body, #root { height: 100%; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      letter-spacing: -0.5px;
      font-feature-settings: 'kern';
      background: #F4F7FE;
      color: #1B254B;
    }
    /* Lucide icons inherit currentColor; default stroke-width is good */
    [data-lucide] { display: inline-block; }
    /* Smooth scroll fades */
    main { scroll-behavior: smooth; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Seed data -->
  <script src="data.js"></script>

  <!-- Components (order matters: primitives → leaf → composite → app) -->
  <script type="text/babel" data-presets="react" src="Primitives.jsx"></script>
  <script type="text/babel" data-presets="react" src="ShareModal.jsx"></script>
  <script type="text/babel" data-presets="react" src="ProfileMenu.jsx"></script>
  <script type="text/babel" data-presets="react" src="Sidebar.jsx"></script>
  <script type="text/babel" data-presets="react" src="Topbar.jsx"></script>
  <script type="text/babel" data-presets="react" src="Dashboard.jsx"></script>
  <script type="text/babel" data-presets="react" src="Candidates.jsx"></script>
  <script type="text/babel" data-presets="react" src="CandidateDetail.jsx"></script>
  <script type="text/babel" data-presets="react" src="Jobs.jsx"></script>
  <script type="text/babel" data-presets="react" src="Upload.jsx"></script>
  <script type="text/babel" data-presets="react" src="Staff.jsx"></script>
  <script type="text/babel" data-presets="react" src="NewHire.jsx"></script>
  <script type="text/babel" data-presets="react" src="EmployeeDetail.jsx"></script>
  <script type="text/babel" data-presets="react" src="Departments.jsx"></script>
  <script type="text/babel" data-presets="react" src="Interviews.jsx"></script>
  <script type="text/babel" data-presets="react" src="Reports.jsx"></script>
  <script type="text/babel" data-presets="react" src="Login.jsx"></script>
  <script type="text/babel" data-presets="react" src="App.jsx"></script>

  <script type="text/babel" data-presets="react">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    // Batch Lucide refreshes so icon replacement does not recursively retrigger itself.
    let lucideRefreshQueued = false;
    window.__refreshLucideIcons = () => {
      if (!window.lucide || lucideRefreshQueued) return;
      lucideRefreshQueued = true;
      requestAnimationFrame(() => {
        lucideRefreshQueued = false;
        window.lucide.createIcons({ nameAttr: 'data-lucide' });
      });
    };
    window.__refreshLucideIcons();
  </script>
</body>
</html>
