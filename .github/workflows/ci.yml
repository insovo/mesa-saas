# MESA Recruit · CI 流水线(阶段⑤.2)
# 触发: push 到任意分支 / PR 到 main
# 目标: 安装依赖、生成 Prisma client、构建前端,验证可以打包

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: server · install + prisma generate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Syntax-check entry
        run: node --check src/index.js
      - name: Unit tests
        run: npm test

  web:
    name: web · build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 7

  docker-build:
    name: docker · multi-stage smoke build
    runs-on: ubuntu-latest
    needs: [server, web]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          tags: mesa-server:ci
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max
      - name: Build web image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          tags: mesa-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
      - name: Build lark-ingest image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./tools/lark-ingest
          push: false
          tags: mesa-lark-ingest:ci
          cache-from: type=gha,scope=lark-ingest
          cache-to: type=gha,scope=lark-ingest,mode=max
