# MESA Recruit · 生产部署流水线(阶段⑤.2)
# 触发: 仅 main 分支 push 触发
# 流程:
#   1) 构建 server / web 镜像并推送到 GHCR
#   2) SSH 连接生产 VPS 拉取最新镜像 + docker compose up -d 滚动升级
# 前置: GitHub repo Secrets 需配置:
#   - GHCR_TOKEN          (含 write:packages 权限的 PAT,或用默认 GITHUB_TOKEN)
#   - VPS_HOST            生产 VPS 公网 IP / 域名
#   - VPS_USER            SSH 用户(建议非 root)
#   - VPS_SSH_KEY         私钥(PEM 格式,无密码或在 known_hosts 已加密)
#   - VPS_DEPLOY_DIR      仓库克隆位置,例: /opt/mesa
# .env 永远不进 CI,只在 VPS 本地的 /opt/mesa/.env

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "tag=$(echo ${GITHUB_SHA} | head -c 8)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/mesa-server:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/mesa-server:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/mesa-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/mesa-web:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}  # 在 Repo Variables 里手动开关
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.tag }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN,IMAGE_TAG,REPO_URL
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_DIR }}"

            echo "[deploy] $(date +%F\ %T) syncing repo (preserves .env/web/certs untracked)..."
            if [ ! -d .git ]; then
              git init -b main
              git remote add origin "$REPO_URL" || git remote set-url origin "$REPO_URL"
            fi
            git fetch --depth=1 origin main
            git reset --hard origin/main

            echo "[deploy] docker login ghcr.io..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "[deploy] pulling latest GHCR images (tag=$IMAGE_TAG)..."
            # 只拉项目自研镜像(backend + frontend / web)。
            # 旧策略 `docker compose pull backend frontend || true` 的陷阱(踩坑 #37):
            #   GHCR token 偶发 unauthorized 或网络抖时 pull 被 `|| true` silently 吞掉,
            #   接下来 `docker compose up --pull missing` 看到本地有旧 image 就不重拉,
            #   结果容器跑着上一版镜像 → 看似部署成功,实则前端/后端老代码,极难发觉。
            # 新策略:逐个 service pull,任何一个失败就 fallback 到 `docker compose build` 本地构建。
            # 慢一些(2-3min)但绝不会"看似部署成功实则用旧 image"。
            need_build=0
            for svc in backend frontend; do
              if ! docker compose pull "$svc"; then
                echo "[deploy] pull $svc failed → 将本地 build 兜底"
                need_build=1
              fi
            done
            if [ "$need_build" = "1" ]; then
              echo "[deploy] rebuilding image(s) locally from /opt/mesa source..."
              docker compose build backend frontend
            fi

            echo "[deploy] applying compose (--pull missing 保留 postgres/redis 现有镜像不重拉)..."
            # backend Dockerfile CMD 启动时会自动跑 `prisma migrate deploy`,无需额外 exec
            docker compose up -d --remove-orphans --pull missing

            echo "[deploy] verifying health..."
            sleep 8
            docker compose ps
            docker compose exec -T frontend wget -qO- http://127.0.0.1/healthz | grep -q ok && echo "[deploy] healthcheck ok"

            echo "[deploy] pruning dangling images..."
            docker image prune -f
            docker logout ghcr.io
            echo "[deploy] done."
