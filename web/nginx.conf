# MESA Web · Nginx 配置(容器内)
# 职责: 1) 托管 React SPA 静态资源  2) 反代 /api 到后端容器  3) SPA 路由兜底
# TLS: 加载 Cloudflare Origin Certificate(15 年有效),配合 Cloudflare Full(strict) 模式实现端到端 HTTPS。
# 监听: 80 强制跳 HTTPS,443 提供主服务。

# ─── 80 → 443 redirect ───────────────────────────────────────
server {
  listen 80 default_server;
  server_name _;

  # 容器健康检查(docker healthcheck wget http://127.0.0.1/healthz)走 80
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ─── 443 主服务 ──────────────────────────────────────────────
server {
  listen 443 ssl http2 default_server;
  server_name _;

  ssl_certificate     /etc/nginx/certs/insovo.top.pem;
  ssl_certificate_key /etc/nginx/certs/insovo.top.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip — 仅压缩文本类
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml font/woff2;

  # 静态资源缓存(带 hash 文件名时安全长缓存)
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # /api 反向代理到后端容器(docker-compose 服务名 = backend)
  location /api/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
  }

  # 容器健康检查端点
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # SPA 路由兜底
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 安全头(Cloudflare 也会注入,这里多一层保险)
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
