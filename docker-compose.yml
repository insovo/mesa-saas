# MESA Recruit · 生产容器编排(阶段③)
# 4 个服务: frontend(Nginx) · backend(Fastify) · postgres · redis
# 端口暴露原则:
#   - 仅 frontend 暴露 80 (TLS 由外层网关 / Cloudflare 终止)
#   - backend / postgres / redis 严禁映射到宿主机公网(仅在 bridge 网络内通信)
# 数据卷:
#   - mesa_pg_data, mesa_redis_data 由本 compose 文件托管
#   - 备份脚本(ops/backup.sh)从容器内 pg_dump 后压缩上传 R2

services:
  frontend:
    # 双源镜像策略:
    #   - CI 推送到 GHCR(由 .github/workflows/deploy.yml 完成)
    #   - VPS 上 docker compose pull 即可拉取
    #   - 本地无 GHCR 凭证时,docker compose up --build 走 build 块
    image: ${WEB_IMAGE:-ghcr.io/insovo/mesa-web:latest}
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mesa-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # 80 强制跳 443;443 提供主服务(端口在 .env 里可调,默认 80/443)
      - "${WEB_HTTP_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    volumes:
      # 挂载 Cloudflare Origin Certificate(只读),证书永远不入镜像
      - ./web/certs:/etc/nginx/certs:ro
    networks:
      - mesa-net

  backend:
    image: ${SERVER_IMAGE:-ghcr.io/insovo/mesa-server:latest}
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mesa-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      WEB_ORIGIN: ${WEB_ORIGIN:?set WEB_ORIGIN in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      # Cloudflare R2(可选) — 若未配置,后端 r2 plugin 自动跳过,/api/storage/* 返回 503
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
    # 故意不映射端口 — 仅在 bridge 网络内通过服务名 backend:3001 访问
    expose:
      - "3001"
    networks:
      - mesa-net

  postgres:
    image: postgres:16-alpine
    container_name: mesa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    # 严禁映射到宿主机公网 — 仅在 bridge 网络内通过服务名 postgres:5432 访问
    expose:
      - "5432"
    volumes:
      - mesa_pg_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - mesa-net

  redis:
    image: redis:7-alpine
    container_name: mesa-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60 1"
    # 同上 — 仅在 bridge 网络内访问
    expose:
      - "6379"
    volumes:
      - mesa_redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - mesa-net

networks:
  mesa-net:
    driver: bridge

volumes:
  mesa_pg_prod_data:
  mesa_redis_prod_data:
