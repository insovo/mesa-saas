# MESA Recruit · 生产容器编排(阶段③)
# 4 个服务: frontend(Nginx) · backend(Fastify) · postgres · redis
# 端口暴露原则:
#   - 仅 frontend 暴露 80 (TLS 由外层网关 / Cloudflare 终止)
#   - backend / postgres / redis 严禁映射到宿主机公网(仅在 bridge 网络内通信)
# 数据卷:
#   - mesa_pg_data, mesa_redis_data 由本 compose 文件托管
#   - 备份脚本(ops/backup.sh)从容器内 pg_dump 后压缩上传 R2

services:
  frontend:
    # 双源镜像策略:
    #   - CI 推送到 GHCR(由 .github/workflows/deploy.yml 完成)
    #   - VPS 上 docker compose pull 即可拉取
    #   - 本地无 GHCR 凭证时,docker compose up --build 走 build 块
    image: ${WEB_IMAGE:-ghcr.io/insovo/mesa-web:latest}
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mesa-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # 80 强制跳 443;443 提供主服务(端口在 .env 里可调,默认 80/443)
      - "${WEB_HTTP_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    volumes:
      # 挂载 Cloudflare Origin Certificate(只读),证书永远不入镜像
      - ./web/certs:/etc/nginx/certs:ro
    networks:
      - mesa-net

  backend:
    image: ${SERVER_IMAGE:-ghcr.io/insovo/mesa-server:latest}
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mesa-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      WEB_ORIGIN: ${WEB_ORIGIN:?set WEB_ORIGIN in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      # Cloudflare R2(可选) — 若未配置,后端 r2 plugin 自动跳过,/api/storage/* 返回 503
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      # Kimi (Moonshot AI) — 系统统一持有的 LLM 简历解析 key
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      KIMI_MODEL: ${KIMI_MODEL:-moonshot-v1-32k}
      KIMI_BASE_URL: ${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      # Resend(账号自助:改邮箱/改密验证码 + 忘记密码)
      # 未配 RESEND_API_KEY 时后端 dev fallback:验证码进响应 devCode + 日志可见
      # 生产前必须先在 Resend Dashboard 加自有域名并验证 DNS
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-MESA Recruit <onboarding@resend.dev>}
      APP_BASE_URL: ${APP_BASE_URL:-https://insovo.top}
      # 飞书卡片回调(card.action.trigger)校验:Verification Token 必填,Encrypt Key 可选(配了才解密)
      FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
      FEISHU_ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY:-}
    # 故意不映射端口 — 仅在 bridge 网络内通过服务名 backend:3001 访问
    expose:
      - "3001"
    networks:
      - mesa-net

  postgres:
    image: postgres:16-alpine
    container_name: mesa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    # 严禁映射到宿主机公网 — 仅在 bridge 网络内通过服务名 postgres:5432 访问
    expose:
      - "5432"
    volumes:
      - mesa_pg_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - mesa-net

  redis:
    image: redis:7-alpine
    container_name: mesa-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60 1"
    # 同上 — 仅在 bridge 网络内访问
    expose:
      - "6379"
    volumes:
      - mesa_redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - mesa-net

  # === 监控 · Uptime Kuma ===
  # 容器内监听 3001,通过 frontend Nginx 反代到 monitor.insovo.top 暴露。
  # 不直接映射宿主机端口,流量必须经 nginx → cloudflare 出。
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: mesa-uptime
    restart: unless-stopped
    volumes:
      - mesa_uptime_data:/app/data
    expose:
      - "3001"
    networks:
      - mesa-net
    healthcheck:
      test: ["CMD", "node", "extra/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # === 飞书简历自动入库 · lark-ingest ===
  # 长连接监听飞书群/私聊的简历文件 → 下载 → 喂进 backend 公开上传通道(/api/public/upload)。
  # 纯出站连接,不暴露任何端口;凭证经 .env 注入,绝不入镜像。
  lark-ingest:
    image: ${LARK_INGEST_IMAGE:-ghcr.io/insovo/mesa-lark-ingest:latest}
    build:
      context: ./tools/lark-ingest
      dockerfile: Dockerfile
    container_name: mesa-lark-ingest
    restart: unless-stopped
    init: true   # 复用 tini 回收 lark-cli event bus daemon 的子进程,避免僵尸进程
    depends_on:
      - backend
    environment:
      # 飞书自建应用凭证(entrypoint 用 stdin 配 lark-cli)。
      # 用 :- 默认空 而非 :? 必填 —— 缺凭证只让本容器重启,不拖垮整个 deploy 的 compose up。
      # entrypoint.sh 会校验缺失并明确退出(容器进入重启循环,日志可见)。
      LARK_APP_ID: ${LARK_APP_ID:-}
      LARK_APP_SECRET: ${LARK_APP_SECRET:-}
      LARK_BRAND: ${LARK_BRAND:-feishu}
      # 入库走 backend 内网直连(免走 Cloudflare,规避 100s 上限)
      MESA_BASE_URL: ${LARK_MESA_BASE_URL:-http://backend:3001}
      # MESA 长期公开上传链接 token(决定入库候选人归属人 ownerId)
      UPLOAD_TOKEN: ${LARK_UPLOAD_TOKEN:-}
      # 群内回执开关(机器人回复上传结果);需飞书应用已开发送消息权限,未开可设 false
      REPLY_ENABLED: ${LARK_REPLY_ENABLED:-true}
    volumes:
      - mesa_lark_ingest_data:/app/data   # 去重状态持久化,扛重启
    networks:
      - mesa-net

networks:
  mesa-net:
    driver: bridge

volumes:
  mesa_pg_prod_data:
  mesa_redis_prod_data:
  mesa_uptime_data:
  mesa_lark_ingest_data:
